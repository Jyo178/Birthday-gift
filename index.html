<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Venky Anna 🎉</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>

<!-- 🌄 FULL SCREEN SLIDESHOW -->
<img id="bg-slideshow" 
     src="photo1.jpeg"
     class="fixed top-0 left-0 w-full h-full object-cover transition duration-700">

<!-- 🌑 DARK OVERLAY -->
<div class="fixed top-0 left-0 w-full h-full bg-black/30"></div>

<!-- 🎊 CELEBRATE BUTTON -->
<div class="fixed bottom-10 w-full flex justify-center z-10">
  <button onclick="celebrate()" 
    class="px-8 py-3 bg-pink-500 text-white text-lg rounded-xl shadow-lg hover:bg-pink-600 transition">
    🎊 Celebrate 🎊
  </button>
</div>

<!-- 🎵 MUSIC -->
<audio id="music" autoplay loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
  // 🎵 Try autoplay on load
  window.onload = () => {
    const music = document.getElementById("music");

    music.play().catch(() => {
      console.log("Autoplay blocked, user interaction needed");
    });

    // 🎉 Initial confetti
    confetti({
      particleCount: 120,
      spread: 100,
      origin: { y: 0.6 }
    });
  };

  // 🎊 Button confetti
  function celebrate() {
    const music = document.getElementById("music");
    music.play();

    confetti({
      particleCount: 200,
      spread: 120,
      origin: { y: 0.6 }
    });
  }

  // 📸 SLIDESHOW IMAGES
  let images = [];

  // photo1 → photo66
  for (let i = 1; i <= 66; i++) {
    images.push(`photo${i}.jpeg`);
  }

  // extra images
  images.push(
    "photo1_2.jpeg",
    "photo49_1.jpeg",
    "photo50_1.jpeg",
    "photo50_2.jpeg"
  );

  // shuffle images
  images.sort(() => Math.random() - 0.5);

  let index = 0;

  // 🔄 Slideshow loop
  setInterval(() => {
    index = (index + 1) % images.length;

    const slide = document.getElementById("bg-slideshow");

    slide.style.opacity = 0;

    setTimeout(() => {
      slide.src = images[index];
      slide.style.opacity = 1;
    }, 300);

  }, 2000);

</script>

</body>
</html>
