<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slideshow 🎉</title>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    #bg-slideshow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transition: opacity 0.7s ease;
    }
  </style>
</head>

<body>

<!-- 📸 FULL SCREEN IMAGE -->
<img id="bg-slideshow" src="photo1.jpeg">

<!-- 🎵 MUSIC -->
<audio id="music" autoplay loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>

  // 🎵 Try autoplay
  window.onload = () => {
    const music = document.getElementById("music");

    music.play().catch(() => {
      console.log("Autoplay blocked");
    });

    // 🎉 Confetti once on load
    confetti({
      particleCount: 150,
      spread: 120,
      origin: { y: 0.6 }
    });
  };

  // 📸 IMAGE LIST
  let images = [];

  // photo1 → photo66
  for (let i = 1; i <= 66; i++) {
    images.push(`photo${i}.jpeg`);
  }

  // extra images
  images.push(
    "photo1_2.jpeg",
    "photo49_1.jpeg",
    "photo50_1.jpeg",
    "photo50_2.jpeg"
  );

  // shuffle images (random order)
  images.sort(() => Math.random() - 0.5);

  let index = 0;

  // 🔄 SLIDESHOW LOOP
  setInterval(() => {
    index = (index + 1) % images.length;

    const slide = document.getElementById("bg-slideshow");

    slide.style.opacity = 0;

    setTimeout(() => {
      slide.src = images[index];
      slide.style.opacity = 1;
    }, 300);

  }, 2000);

</script>

</body>
</html>
