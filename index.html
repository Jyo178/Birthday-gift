<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Venky Anna 🎉</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>

<!-- 📸 FULL SCREEN IMAGE -->
<img id="bg-slideshow" 
     src="photo1.jpeg"
     class="fixed top-0 left-0 w-full h-full object-cover transition duration-700">

<!-- 🌑 DARK OVERLAY -->
<div class="fixed top-0 left-0 w-full h-full bg-black/30"></div>

<!-- 🎂 TEXT (ONLY FIRST IMAGE) -->
<div id="birthdayText" 
     class="fixed top-10 w-full text-center text-white text-3xl sm:text-5xl font-bold z-10 drop-shadow-lg">
  🎂 Happy Birthday Venky Anna 🎂
</div>

<!-- 🎵 MUSIC -->
<audio id="music" autoplay loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
  // 🎵 autoplay + confetti
  window.onload = () => {
    const music = document.getElementById("music");

    music.play().catch(() => {
      console.log("Autoplay blocked");
    });

    confetti({
      particleCount: 120,
      spread: 100,
      origin: { y: 0.6 }
    });
  };

  // 📸 IMAGES
  let images = [];

  for (let i = 1; i <= 66; i++) {
    images.push(`photo${i}.jpeg`);
  }

  images.push(
    "photo1_2.jpeg",
    "photo49_1.jpeg",
    "photo50_1.jpeg",
    "photo50_2.jpeg"
  );

  images.sort(() => Math.random() - 0.5);

  let index = 0;

  // 🔄 SLIDESHOW
  setInterval(() => {
    index = (index + 1) % images.length;

    const slide = document.getElementById("bg-slideshow");
    const text = document.getElementById("birthdayText");

    slide.style.opacity = 0;

    setTimeout(() => {
      slide.src = images[index];
      slide.style.opacity = 1;

      // 🎯 SHOW TEXT ONLY ON FIRST IMAGE
      if (index === 0) {
        text.style.display = "block";
      } else {
        text.style.display = "none";
      }

    }, 300);

  }, 2000);

</script>

</body>
</html>
